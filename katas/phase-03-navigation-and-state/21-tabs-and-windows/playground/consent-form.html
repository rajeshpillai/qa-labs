<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Consent Form | KYC Portal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8fafc; color: #1e293b; padding: 2rem; }
    h1 { font-size: 1.25rem; margin-bottom: 1rem; color: #0f172a; }
    p { font-size: 0.875rem; color: #475569; line-height: 1.6; margin-bottom: 0.75rem; }
    .checkbox-group { display: flex; align-items: flex-start; gap: 0.5rem; margin-bottom: 0.75rem; }
    .checkbox-group label { font-size: 0.85rem; color: #334155; cursor: pointer; }
    .btn {
      padding: 0.5rem 1.5rem; border: none; border-radius: 6px;
      font-size: 0.875rem; font-weight: 600; cursor: pointer;
      margin-top: 1rem; margin-right: 0.5rem;
    }
    .btn-consent { background: #22c55e; color: white; }
    .btn-consent:hover { background: #16a34a; }
    .btn-cancel { background: #64748b; color: white; }
    .btn-cancel:hover { background: #475569; }
    .status { margin-top: 1rem; padding: 0.5rem; font-size: 0.85rem; color: #166534; background: #dcfce7; border-radius: 6px; display: none; }
    .status.visible { display: block; }
  </style>
</head>
<body>

  <h1 data-testid="consent-title">Data Processing Consent</h1>
  <p data-testid="consent-description">Please review and consent to the following data processing activities required for your KYC verification.</p>

  <div class="checkbox-group">
    <input type="checkbox" id="consent-identity" data-testid="consent-identity">
    <label for="consent-identity">I consent to identity document verification</label>
  </div>
  <div class="checkbox-group">
    <input type="checkbox" id="consent-background" data-testid="consent-background">
    <label for="consent-background">I consent to background screening checks</label>
  </div>
  <div class="checkbox-group">
    <input type="checkbox" id="consent-storage" data-testid="consent-storage">
    <label for="consent-storage">I consent to secure data storage for regulatory compliance</label>
  </div>

  <button class="btn btn-consent" data-testid="btn-give-consent" id="btn-give-consent">Give Consent</button>
  <button class="btn btn-cancel" data-testid="btn-cancel-consent" id="btn-cancel-consent">Cancel</button>

  <div class="status" data-testid="consent-status" id="consent-status">
    Consent recorded. You may close this window.
  </div>

  <script>
    // "Give Consent" sends a message to the parent window with the
    // consent details.
    document.getElementById('btn-give-consent').addEventListener('click', () => {
      const identity = document.getElementById('consent-identity').checked;
      const background = document.getElementById('consent-background').checked;
      const storage = document.getElementById('consent-storage').checked;

      if (window.opener) {
        window.opener.postMessage({
          type: 'consent-given',
          message: 'User provided data processing consent',
          details: { identity, background, storage }
        }, '*');
      }

      document.getElementById('consent-status').classList.add('visible');
    });

    // "Cancel" closes the popup without sending consent.
    document.getElementById('btn-cancel-consent').addEventListener('click', () => {
      if (window.opener) {
        window.opener.postMessage({
          type: 'consent-cancelled',
          message: 'User cancelled consent form'
        }, '*');
      }
      window.close();
    });
  </script>

</body>
</html>
